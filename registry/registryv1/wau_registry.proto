syntax = "proto3";

package wau.registry.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/wau/wau-registry-service/proto/gen/wau/registry/v1;registryv1";

// =============================================================================
// 通用类型
// =============================================================================

// NatStatus NAT 穿透状态
enum NatStatus {
  NAT_STATUS_UNSPECIFIED = 0;
  NAT_STATUS_PUBLIC = 1;     // 公网可达
  NAT_STATUS_PRIVATE = 2;    // 在 NAT 后
  NAT_STATUS_RELAY = 3;      // 走中继
}

// NodeType 节点类型
enum NodeType {
  NODE_TYPE_UNSPECIFIED = 0;
  NODE_TYPE_KERNEL = 1;      // WAU Kernel
  NODE_TYPE_AGENT = 2;       // AI Agent
  NODE_TYPE_GATEWAY = 3;     // A2A Gateway
  NODE_TYPE_CLI = 4;         // wau-cli
}

// PeerInfo 网络层节点信息（libp2p）
message PeerInfo {
  string name = 1;
  string peer_id = 2;              // libp2p PeerID
  repeated string addrs = 3;       // libp2p multiaddrs
  NodeType node_type = 4;
  NatStatus nat_status = 5;
  repeated string protocols = 6;   // ["a2a/1.0", "libp2p"]
  google.protobuf.Timestamp last_seen = 7;
  map<string, string> metadata = 8;
}

// PeerFilter peer 过滤条件
message PeerFilter {
  NodeType node_type = 1;
  string skill = 2;
  string universe = 3;
  string name_pattern = 4;   // 模糊匹配
  bool online_only = 5;
}

// AgentCard 注册中心版（与 kernel 共享定义，但独立命名以允许独立演进）
// 注：这里重复定义是为了注册中心的独立部署，结构上与 kernel 的 AgentCard 保持一致
message RegistryAgentCard {
  string name = 1;
  string description = 2;
  string url = 3;
  repeated string skills = 4;
  repeated string universes = 5;
  string version = 6;
  google.protobuf.Timestamp last_seen = 7;
}

// =============================================================================
// Peer 管理 RPC
// =============================================================================

message RegisterPeerRequest {
  PeerInfo peer = 1;
}
message RegisterPeerResponse {
  bool accepted = 1;
  string message = 2;
}

message DeregisterPeerRequest {
  string name = 1;
}
message DeregisterPeerResponse {}

message GetPeerRequest {
  string name = 1;
}
message GetPeerResponse {
  PeerInfo peer = 1;
  bool found = 2;
}

message GetPeersRequest {
  PeerFilter filter = 1;
}
message GetPeersResponse {
  repeated PeerInfo peers = 1;
  int32 total = 2;
}

message WatchPeersRequest {
  PeerFilter filter = 1;
}
message WatchPeersResponse {
  enum EventType {
    EVENT_TYPE_UNSPECIFIED = 0;
    EVENT_TYPE_REGISTERED = 1;
    EVENT_TYPE_DEREGISTERED = 2;
    EVENT_TYPE_UPDATED = 3;
  }
  EventType event = 1;
  PeerInfo peer = 2;
}

// =============================================================================
// AgentCard RPC（兼容旧版）
// =============================================================================

message RegisterCardRequest {
  RegistryAgentCard card = 1;
}
message RegisterCardResponse {}

message GetCardRequest {
  string name = 1;
}
message GetCardResponse {
  RegistryAgentCard card = 1;
  bool found = 2;
}

message GetCardsRequest {
  string skill = 1;
  string universe = 2;
}
message GetCardsResponse {
  repeated RegistryAgentCard cards = 1;
  int32 total = 2;
}

// =============================================================================
// Registry Service
// =============================================================================

service RegistryService {
  // ════════════ Peer 管理（libp2p） ════════════
  // RegisterPeer 注册一个 peer（带 libp2p 信息）
  rpc RegisterPeer(RegisterPeerRequest) returns (RegisterPeerResponse);
  // DeregisterPeer 注销一个 peer
  rpc DeregisterPeer(DeregisterPeerRequest) returns (DeregisterPeerResponse);
  // GetPeer 查询单个 peer
  rpc GetPeer(GetPeerRequest) returns (GetPeerResponse);
  // GetPeers 列出所有 peer（支持过滤）
  rpc GetPeers(GetPeersRequest) returns (GetPeersResponse);
  // WatchPeers 实时订阅 peer 变化
  rpc WatchPeers(WatchPeersRequest) returns (stream WatchPeersResponse);

  // ════════════ AgentCard（兼容 WAU-a2a-gateway） ════════════
  rpc RegisterCard(RegisterCardRequest) returns (RegisterCardResponse);
  rpc GetCard(GetCardRequest) returns (GetCardResponse);
  rpc GetCards(GetCardsRequest) returns (GetCardsResponse);

  // ════════════ 健康检查 ════════════
  rpc Ping(PingRequest) returns (PingResponse);
}

message PingRequest {}
message PingResponse {
  string status = 1;
  int64 peer_count = 2;
  int64 card_count = 3;
}
